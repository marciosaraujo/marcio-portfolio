<svg width="760" height="560" viewBox="0 0 760 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="A minimalist hacker-style terminal window running a DevOps deploy session, over a dark background with gradient glow blobs">
  <defs>
    <linearGradient id="winBg" x1="0" y1="0" x2="760" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1424"/>
      <stop offset="1" stop-color="#080c16"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="blobCyan" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobPurple" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobIndigo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.75">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.7" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <clipPath id="winClip">
      <rect x="60" y="70" width="640" height="420" rx="16"/>
    </clipPath>
  </defs>

  <!-- Base dark background -->
  <rect width="760" height="560" fill="#0a0f1a"/>

  <!-- Gradient glow blobs -->
  <circle cx="120" cy="120" r="260" fill="url(#blobCyan)"/>
  <circle cx="660" cy="90" r="240" fill="url(#blobPurple)"/>
  <circle cx="400" cy="520" r="280" fill="url(#blobIndigo)"/>

  <!-- Terminal / CLI grid texture -->
  <g stroke="#9bb0c9" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 80H760M0 160H760M0 240H760M0 320H760M0 400H760M0 480H760"/>
    <path d="M80 0V560M160 0V560M240 0V560M320 0V560M400 0V560M480 0V560M560 0V560M640 0V560M720 0V560"/>
  </g>

  <!-- Dark overlay for depth -->
  <rect width="760" height="560" fill="#070b14" opacity="0.35"/>

  <!-- Terminal window -->
  <g>
    <!-- soft outer glow -->
    <rect x="56" y="66" width="648" height="428" rx="20" fill="#22d3ee" opacity="0.06"/>
    <!-- window body -->
    <rect x="60" y="70" width="640" height="420" rx="16" fill="url(#winBg)" stroke="#ffffff" stroke-opacity="0.1"/>

    <!-- title bar -->
    <rect x="60" y="70" width="640" height="44" rx="16" fill="#11192b"/>
    <rect x="60" y="98" width="640" height="16" fill="#11192b"/>
    <circle cx="86" cy="92" r="6" fill="#ff5f57"/>
    <circle cx="108" cy="92" r="6" fill="#febc2e"/>
    <circle cx="130" cy="92" r="6" fill="#28c840"/>
    <rect x="300" y="85" width="160" height="14" rx="7" fill="#1c2740"/>

    <!-- code body -->
    <g clip-path="url(#winClip)" font-family="'SFMono-Regular','Consolas','Liberation Mono',monospace" font-size="15">
      <!-- prompt 1 -->
      <text x="84" y="150" fill="#22d3ee">~/infra</text>
      <text x="148" y="150" fill="#7dd3fc">$</text>
      <text x="164" y="150" fill="#e2e8f0">terraform apply -auto-approve</text>

      <text x="84" y="178" fill="#64748b"># Plan: 12 to add, 0 to change, 0 to destroy</text>
      <text x="84" y="202" fill="#34d399">+ module.network.cloudflare_worker.edge</text>
      <text x="84" y="226" fill="#34d399">+ module.observability.grafana_dashboard</text>
      <text x="84" y="250" fill="#a78bfa">Apply complete!</text>
      <text x="240" y="250" fill="#94a3b8">Resources: 12 added.</text>

      <!-- prompt 2 -->
      <text x="84" y="290" fill="#22d3ee">~/infra</text>
      <text x="148" y="290" fill="#7dd3fc">$</text>
      <text x="164" y="290" fill="#e2e8f0">kubectl get pods -n prod</text>

      <text x="84" y="318" fill="#94a3b8">NAME                      READY   STATUS</text>
      <text x="84" y="342" fill="#cbd5e1">api-gateway-7d9f</text>
      <text x="300" y="342" fill="#e2e8f0">2/2</text>
      <text x="356" y="342" fill="#34d399">Running</text>
      <text x="84" y="366" fill="#cbd5e1">dash-worker-5b2c</text>
      <text x="300" y="366" fill="#e2e8f0">1/1</text>
      <text x="356" y="366" fill="#34d399">Running</text>

      <!-- prompt 3 + cursor -->
      <text x="84" y="406" fill="#22d3ee">~/infra</text>
      <text x="148" y="406" fill="#7dd3fc">$</text>
      <text x="164" y="406" fill="#e2e8f0">deploy --target=edge</text>
      <rect x="332" y="394" width="9" height="17" fill="#22d3ee">
        <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
      </rect>

      <!-- status line -->
      <text x="84" y="446" fill="#22d3ee">✔</text>
      <text x="104" y="446" fill="#94a3b8">deployed to marciosaraujo.workers.dev in 1.4s</text>
    </g>
  </g>

  <!-- Vignette -->
  <rect width="760" height="560" fill="url(#vignette)"/>
</svg>
